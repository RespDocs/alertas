<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RespDocs Administración</title>

<style>

:root{
    --bg:#f5f5f5;
    --card:#ffffff;
    --text:#222;
    --shadow:0 4px 10px rgba(0,0,0,.08);

    --green:#2e7d32;
    --yellow:#f9a825;
    --red:#c62828;
    --blue:#1976d2;
}

@media(prefers-color-scheme:dark){

:root{

    --bg:#121212;
    --card:#1f1f1f;
    --text:#eeeeee;
    --shadow:0 4px 10px rgba(0,0,0,.35);

}

}

*{
    box-sizing:border-box;
}

body{

    margin:0;
    font-family:system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);

    display:flex;
    justify-content:center;

}

.app{

    width:100%;
    max-width:430px;
    padding:20px;

}

h1{

    text-align:center;
    margin:10px 0;

}

.subtitulo{

    text-align:center;
    opacity:.75;
    margin-bottom:25px;

}

.card{

    background:var(--card);

    border-radius:16px;

    padding:16px;

    margin:14px 0;

    box-shadow:var(--shadow);

    border-left:8px solid;

}

.green{

    border-color:var(--green);

}

.yellow{

    border-color:var(--yellow);

}

.red{

    border-color:var(--red);

}

.title{

    font-size:1.05rem;

    font-weight:700;

    margin-bottom:10px;

}

.line{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-top:10px;

    gap:10px;

}

.button-group{

    display:flex;

    gap:10px;

}

.btn{

    text-decoration:none;

    background:var(--blue);

    color:white;

    padding:8px 14px;

    border-radius:8px;

    font-size:.9rem;

}

.section{

    margin-top:28px;

}

.section h2{

    margin:0 0 12px;

    font-size:1.15rem;

}

#loginOverlay{

    position:fixed;

    inset:0;

    background:var(--bg);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

#loginBox{

    width:90%;

    max-width:340px;

    background:var(--card);

    padding:30px;

    border-radius:16px;

    text-align:center;

    box-shadow:var(--shadow);

}

#loginBox input[type=password],
#loginBox input[type=text]{

    width:100%;

    padding:10px;

    margin:12px 0;

}

#loginBox button{

    width:100%;

    padding:10px;

    border:none;

    border-radius:8px;

    background:var(--blue);

    color:white;

    cursor:pointer;

}

#error{

    color:var(--red);

    height:20px;

    margin-top:10px;

}

#siteContent{

    display:none;

}

</style>

</head>

<body>

<div id="loginOverlay">

    <div id="loginBox">

        <h2>RespDocs</h2>

        <p><strong>Administración</strong></p>

        <p>Ingrese contraseña</p>

        <input
            id="password"
            type="password"
            autocomplete="off"
        >

        <label>

            <input
                id="showPassword"
                type="checkbox"
            >

            Mostrar contraseña

        </label>

        <br><br>

        <button id="btnLogin">

            INGRESAR

        </button>

        <div id="error"></div>

    </div>

</div>

<div id="siteContent">

<div class="app">

<h1>RespDocs</h1>

<div class="subtitulo">

Centro de Alertas

</div>

<div id="ultimaRevision"></div>

<div class="section">

<h2>🔴 Vencidos</h2>

<div id="vencidos"></div>

</div>

<div class="section">

<h2>🟡 Próximos a vencer</h2>

<div id="proximos"></div>

</div>

<div class="section">

<h2>🟢 Todo vigente</h2>

<div id="vigentes"></div>

</div>

</div>

</div>
<script>

/*==========================================
CONFIGURACIÓN
==========================================*/

const ADMIN_PASSWORD = "julio26";

/*==========================================
REFERENCIAS
==========================================*/

const loginOverlay = document.getElementById("loginOverlay");
const siteContent  = document.getElementById("siteContent");

const password     = document.getElementById("password");
const showPassword = document.getElementById("showPassword");
const btnLogin     = document.getElementById("btnLogin");
const error        = document.getElementById("error");

const ultimaRevision = document.getElementById("ultimaRevision");

const vencidos = document.getElementById("vencidos");
const proximos = document.getElementById("proximos");
const vigentes = document.getElementById("vigentes");

/*==========================================
FECHA ÚLTIMA REVISIÓN
==========================================*/

const ahora = new Date();

ultimaRevision.innerHTML = `
<div style="
margin-bottom:20px;
font-size:.9rem;
opacity:.75;
text-align:center;
">

Última revisión<br>

${ahora.toLocaleDateString("es-CL")}
&nbsp;
${ahora.toLocaleTimeString("es-CL",{
hour:"2-digit",
minute:"2-digit"
})}

</div>
`;

/*==========================================
LOGIN
==========================================*/

function mostrarPortal(){

    loginOverlay.style.display="none";
    siteContent.style.display="block";

}

function validarLogin(){

    if(password.value!==ADMIN_PASSWORD){

        error.textContent="Contraseña incorrecta";

        password.focus();

        password.select();

        return;

    }

    sessionStorage.setItem("respdocs_admin","ok");

    mostrarPortal();

}

showPassword.addEventListener("change",()=>{

    password.type=

        showPassword.checked

        ? "text"

        : "password";

});

btnLogin.addEventListener("click",validarLogin);

password.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){

        validarLogin();

    }

});

if(sessionStorage.getItem("respdocs_admin")==="ok"){

    mostrarPortal();

}else{

    password.focus();

}

/*==========================================
PLANTILLAS
==========================================*/

function tarjetaAlerta(tipo,patente,detalle,web,repo){

return `

<div class="card ${tipo}">

<div class="title">

${patente}

</div>

<div>

${detalle}

</div>

<div class="line">

<div></div>

<div class="button-group">

<a class="btn" href="${web}" target="_blank">

🌐 Web

</a>

<a class="btn" href="${repo}" target="_blank">

📁 Repositorio

</a>

</div>

</div>

</div>

`;

}

function tarjetaVigente(patente){

return `

<div class="card green">

<div class="title">

${patente}

</div>

<div>

Todo vigente

</div>

</div>

`;

}
/*==========================================
RENDER
(El Worker reemplazará esta sección)
==========================================*/

function renderAlertas(data){

    vencidos.innerHTML="";
    proximos.innerHTML="";
    vigentes.innerHTML="";

    data.forEach(v=>{

        if(v.estado==="vencido"){

            vencidos.innerHTML+=tarjetaAlerta(
                "red",
                v.patente,
                v.detalle,
                v.web,
                v.repo
            );

        }

        else if(v.estado==="proximo"){

            proximos.innerHTML+=tarjetaAlerta(
                "yellow",
                v.patente,
                v.detalle,
                v.web,
                v.repo
            );

        }

        else{

            vigentes.innerHTML+=tarjetaVigente(
                v.patente
            );

        }

    });

}

/*==========================================
EL WORKER INSERTARÁ AQUÍ
LAS ALERTAS GENERADAS
==========================================*/

renderAlertas([]);

/*==========================================*/

</script>

</body>

</html>
