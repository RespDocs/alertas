<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>RespDocs Administración</title>

<style>

:root{

    --bg:#f5f5f5;
    --card:#ffffff;
    --text:#222;

    --shadow:0 4px 10px rgba(0,0,0,.08);

    --green:#2e7d32;
    --yellow:#f9a825;
    --red:#c62828;
    --blue:#1976d2;

}

@media(prefers-color-scheme:dark){

:root{

    --bg:#121212;
    --card:#1f1f1f;
    --text:#eeeeee;

    --shadow:0 4px 10px rgba(0,0,0,.35);

}

}

*{

    box-sizing:border-box;

}

body{

    margin:0;

    font-family:system-ui,sans-serif;

    background:var(--bg);

    color:var(--text);

    display:flex;

    justify-content:center;

}

.app{

    width:100%;

    max-width:430px;

    padding:20px;

}

h1{

    text-align:center;

    margin:10px 0 6px;

}

.subtitulo{

    text-align:center;

    opacity:.75;

    margin-bottom:24px;

}

.resumen{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:10px;

    margin-bottom:24px;

}

.resumen .box{

    background:var(--card);

    border-radius:14px;

    box-shadow:var(--shadow);

    padding:12px;

    text-align:center;

}

.resumen .numero{

    font-size:1.6rem;

    font-weight:bold;

}

.card{

    display:block;

    text-decoration:none;

    color:inherit;

    background:var(--card);

    border-radius:16px;

    padding:16px;

    margin:14px 0;

    box-shadow:var(--shadow);

    border-left:8px solid;

    transition:.2s;

}

.card:hover{

    transform:translateY(-2px);

}

.green{

    border-color:var(--green);

}

.yellow{

    border-color:var(--yellow);

}

.red{

    border-color:var(--red);

}

.title{

    font-weight:700;

    margin-bottom:10px;

    font-size:1.05rem;

}

.row{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:10px;

}

.buttons{

    display:flex;

    gap:8px;

    margin-top:15px;

}

.btn{

    flex:1;

    text-align:center;

    text-decoration:none;

    color:#fff;

    background:var(--blue);

    padding:9px;

    border-radius:8px;

    font-size:.9rem;

}

.section{

    margin-top:30px;

}

.section h2{

    margin:0 0 10px;

}

#loginOverlay{

    position:fixed;

    inset:0;

    background:var(--bg);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

#loginBox{

    width:90%;

    max-width:340px;

    background:var(--card);

    padding:30px;

    border-radius:16px;

    text-align:center;

    box-shadow:var(--shadow);

}

#loginBox input[type=password],
#loginBox input[type=text]{

    width:100%;

    padding:10px;

    margin:12px 0;

}

#loginBox button{

    width:100%;

    padding:10px;

    border:none;

    border-radius:8px;

    background:var(--blue);

    color:#fff;

    cursor:pointer;

}

#error{

    color:var(--red);

    height:20px;

    margin-top:10px;

}

#siteContent{

    display:none;

}

small{

    opacity:.70;

}

</style>

</head>
<body>

<div id="loginOverlay">

    <div id="loginBox">

        <h2 id="loginTitle">

            RespDocs

        </h2>

        <p>

            <strong>Administración</strong>

        </p>

        <p>

            Ingrese contraseña

        </p>

        <input
            id="password"
            type="password"
            autocomplete="off"
        >

        <label>

            <input
                id="showPassword"
                type="checkbox"
            >

            Mostrar contraseña

        </label>

        <br><br>

        <button id="btnLogin">

            INGRESAR

        </button>

        <div id="error"></div>

    </div>

</div>

<div id="siteContent">

<div class="app">

<h1>

RespDocs

</h1>

<div class="subtitulo">

Administración

</div>

<div id="ultimaRevision">

<small>

Última actualización

</small>

</div>

<div class="resumen">

<div class="box">

<div class="numero" id="totalVigentes">

0

</div>

🟢<br>

Vigentes

</div>

<div class="box">

<div class="numero" id="totalAlertas">

0

</div>

🟡<br>

Alertas

</div>

<div class="box">

<div class="numero" id="totalVencidos">

0

</div>

🔴<br>

Vencidos

</div>

</div>

<div class="section">

<h2>

🔴 Vencidos

</h2>

<div id="vencidos">

</div>

</div>

<div class="section">

<h2>

🟡 Próximos a vencer

</h2>

<div id="proximos">

</div>

</div>

<div class="section">

<h2>

🟢 Todo vigente

</h2>

<div id="vigentes">

</div>

</div>

<div
style="
margin-top:40px;
text-align:center;
font-size:.85rem;
opacity:.70;
">

RespDocs Administración

</div>

</div>

</div>

<script>
/*==========================================
CONFIGURACIÓN
==========================================*/

const CONFIG={

    titulo:"RespDocs Administración",

    password:"julio26"

};

/*==========================================
ESTE BLOQUE SERÁ REEMPLAZADO
AUTOMÁTICAMENTE POR EL WORKER
==========================================*/

const ALERTAS=[];

/*==========================================
REFERENCIAS
==========================================*/

const pageTitle=document.querySelector("h1");
const loginTitle=document.getElementById("loginTitle");

const loginOverlay=document.getElementById("loginOverlay");
const siteContent=document.getElementById("siteContent");

const password=document.getElementById("password");
const showPassword=document.getElementById("showPassword");
const btnLogin=document.getElementById("btnLogin");
const error=document.getElementById("error");

const ultimaRevision=document.getElementById("ultimaRevision");

const totalVigentes=document.getElementById("totalVigentes");
const totalAlertas=document.getElementById("totalAlertas");
const totalVencidos=document.getElementById("totalVencidos");

const vencidos=document.getElementById("vencidos");
const proximos=document.getElementById("proximos");
const vigentes=document.getElementById("vigentes");

pageTitle.textContent="RespDocs";

loginTitle.textContent="RespDocs";

/*==========================================
ÚLTIMA REVISIÓN
==========================================*/

const ahora=new Date();

ultimaRevision.innerHTML=`

<small>

Última actualización

</small>

<br><br>

<strong>

${ahora.toLocaleDateString("es-CL")}

</strong>

<br>

${ahora.toLocaleTimeString("es-CL",{

hour:"2-digit",

minute:"2-digit"

})}

/*==========================================
LOGIN
==========================================*/

function mostrarPortal(){

    loginOverlay.style.display="none";

    siteContent.style.display="block";

}

function validarLogin(){

    if(password.value!==CONFIG.password){

        error.textContent="Contraseña incorrecta";

        password.focus();

        password.select();

        return;

    }

    sessionStorage.setItem("respdocs_admin","ok");

    mostrarPortal();

    render();

}

showPassword.addEventListener("change",()=>{

    password.type=

        showPassword.checked

        ? "text"

        : "password";

});

btnLogin.addEventListener("click",validarLogin);

password.addEventListener("keydown",e=>{

    if(e.key==="Enter"){

        validarLogin();

    }

});

/*==========================================
TARJETAS
==========================================*/

function crearTarjetaAlerta(item){

    return `

<div class="card ${item.color}">

    <div class="title">

        ${item.icono} ${item.patente}

    </div>

    <div>

        ${item.documento}

    </div>

    <br>

    <div>

        ${item.estado}

    </div>

    <div class="buttons">

        <a
            class="btn"
            href="${item.web}"
            target="_blank">

            🌐 Abrir

        </a>

        <a
            class="btn"
            href="${item.repo}"
            target="_blank">

            📁 Repositorio

        </a>

    </div>

</div>

`;

}

function crearTarjetaVigente(item){

    return `

<div class="card green">

    <div class="title">

        🟢 ${item.patente}

    </div>

    <div>

        Todo vigente

    </div>

</div>

`;

}`;
/*==========================================
RENDER
==========================================*/

function render(){

    vencidos.innerHTML="";
    proximos.innerHTML="";
    vigentes.innerHTML="";

    let cVencidos=0;
    let cAlertas=0;
    let cVigentes=0;

    ALERTAS.forEach(item=>{

        if(item.estado==="vencido"){

            vencidos.innerHTML+=crearTarjetaAlerta(item);

            cVencidos++;

        }

        else if(item.estado==="proximo"){

            proximos.innerHTML+=crearTarjetaAlerta(item);

            cAlertas++;

        }

        else{

            vigentes.innerHTML+=crearTarjetaVigente(item);

            cVigentes++;

        }

    });

    if(cVencidos===0){

        vencidos.innerHTML=`
        <div class="card green">
            <div class="title">
                ✅ Sin documentos vencidos
            </div>
        </div>`;
    }

    if(cAlertas===0){

        proximos.innerHTML=`
        <div class="card green">
            <div class="title">
                ✅ Sin alertas próximas
            </div>
        </div>`;
    }

    if(cVigentes===0){

        vigentes.innerHTML=`
        <div class="card yellow">
            <div class="title">
                No existen vehículos completamente vigentes
            </div>
        </div>`;
    }

    totalVencidos.textContent=cVencidos;
    totalAlertas.textContent=cAlertas;
    totalVigentes.textContent=cVigentes;

}

/*==========================================
INICIALIZACIÓN
==========================================*/

if(sessionStorage.getItem("respdocs_admin")==="ok"){

    mostrarPortal();

    render();

}
else{

    password.focus();

}

</script>

</body>

</html>
